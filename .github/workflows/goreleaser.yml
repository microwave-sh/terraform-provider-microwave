# goreleaser: triggered when semantic-release publishes a GitHub Release.
# Builds the signed multi-platform artifacts the Terraform Registry pulls.
#
# The trigger is `release: published`, NOT `push: tags`. semantic-release
# creates tags via the GitHub API under an App-token identity, and those
# API-authored tag creates don't reliably fire `push: tags` workflows
# (v1.0.0 hit this — tag was pushed, goreleaser stayed dormant). The
# release-published event does fire under the same conditions, which is
# why microwave-app's deploy.yml uses the same hook.
#
# Required secrets: GPG_PRIVATE_KEY + PASSPHRASE for signing. The matching
# GPG public key must be uploaded to the microwave-sh/microwave namespace
# on registry.terraform.io.
name: goreleaser

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
