# semantic-release: analyse Conventional Commits on every push to main, mint
# a vX.Y.Z tag under the Robot App identity. The tag push triggers
# goreleaser.yml (separate workflow) which builds and signs the artifacts.
#
# Using the App token rather than GITHUB_TOKEN matters: GHA does not fire
# downstream workflows for events authored by GITHUB_TOKEN, which would
# leave goreleaser dormant on every release. App tokens are exempt from the
# anti-loop rule, so the tag push reaches the downstream workflow.
name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Generate Robot App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Release
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/exec@6
            @semantic-release/git@10
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
