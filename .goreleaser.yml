# goreleaser config for the Microwave Terraform provider.
#
# Triggered by .github/workflows/goreleaser.yml on every v* tag (which
# semantic-release pushes on every release-worthy commit to main). Produces:
#
#   - Cross-platform binaries (linux/darwin/windows × amd64/arm64)
#   - SHA256SUMS manifest
#   - Detached GPG signature over the manifest (--detach-sign)
#   - GitHub Release with all of the above attached
#
# The Terraform Registry pulls the artifacts from the GitHub Release and
# verifies the GPG signature against the public key registered on the
# registry.terraform.io/microwave-sh/microwave namespace.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}}'
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - formats: [zip]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'

changelog:
  disable: true
